<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Final Metamorphosis | 60FPS Edition</title>
    
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #150515 0%, #000 100%);
            overflow: hidden; color: white; font-family: 'Segoe UI', sans-serif;
            cursor: pointer; /* Suggests interaction */
        }
        #gardenCanvas { display: block; position: fixed; inset: 0; z-index: 1; }
        .ui-overlay {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); text-align: center;
            z-index: 10; pointer-events: none;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 3rem; border-radius: 40px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.9);
        }
        h1 {
            font-size: 3.5rem; letter-spacing: 15px; text-transform: uppercase;
            margin: 0; background: linear-gradient(to right, #ff758c, #ff7eb3);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body>
    
<audio id="bgm" loop autoplay>
    <source src="jolianne_arthur_nery_palayo_sa_mundo_official_lyric_video_mp3_49144 (mp3cut.net).mp3" type="audio/mpeg">
</audio>


<div class="ui-overlay">
    <div class="glass-card">
        <h1>Month One</h1>
        <p style="letter-spacing: 5px; opacity: 0.5; margin-top: 15px;">NO OTHERS. NO JUDGEMENT. JUST US.</p>
        <p style="font-size: 0.7rem; margin-top: 20px; opacity: 0.3;">(Click anywhere to start music)</p>
    </div>
</div>

<canvas id="gardenCanvas"></canvas>

<script>
    // --- AUTOPLAY FIX ---
    const audio = document.getElementById('bgm');
    
    // Attempt to play immediately (works in some browsers)
    audio.play().catch(() => {
        console.log("Autoplay blocked. Waiting for user interaction...");
    });

    // Play on first click
    window.addEventListener('click', () => {
        if (audio.paused) {
            audio.play();
        }
    }, { once: true }); // Only runs once

    const canvas = document.getElementById('gardenCanvas');
    const ctx = canvas.getContext('2d', { alpha: false });
    let width, height, butterflies = [];
    const mouse = { x: -1000, y: -1000 };

    class Butterfly {
        constructor() {
            this.init();
        }

        init() {
            this.x = Math.random() * width;
            this.y = Math.random() * height;
            this.vx = (Math.random() - 0.5) * 2;
            this.vy = (Math.random() - 0.5) * 2;
            this.size = Math.random() * 15 + 20;
            this.color = `hsl(${Math.random() * 30 + 330}, 80%, 60%)`;
            this.flap = Math.random() * Math.PI * 2;
            this.flapSpeed = 0.15 + Math.random() * 0.1;
        }

        update() {
            this.x += this.vx;
            this.y += this.vy;

            let dx = mouse.x - this.x;
            let dy = mouse.y - this.y;
            let dist = Math.sqrt(dx*dx + dy*dy);
            
            if(dist < 300) {
                this.vx += dx * 0.0005;
                this.vy += dy * 0.0005;
            }

            let speed = Math.sqrt(this.vx*this.vx + this.vy*this.vy);
            if(speed > 3) {
                this.vx *= 0.95;
                this.vy *= 0.95;
            }

            this.flap += this.flapSpeed;

            if(this.x < -50) this.x = width + 50;
            if(this.x > width + 50) this.x = -50;
            if(this.y < -50) this.y = height + 50;
            if(this.y > height + 50) this.y = -50;
        }

        drawWing(side) {
            let flapScale = Math.sin(this.flap) * side;
            ctx.save();
            ctx.scale(flapScale, 1);
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.bezierCurveTo(10, -20, 40, -30, 45, -10);
            ctx.bezierCurveTo(50, 10, 20, 10, 40, 30);
            ctx.bezierCurveTo(30, 45, 5, 20, 0, 0);
            let grad = ctx.createRadialGradient(0,0,0,0,0,45);
            grad.addColorStop(0, '#fff');
            grad.addColorStop(0.3, this.color);
            grad.addColorStop(1, '#000');
            ctx.fillStyle = grad;
            ctx.fill();
            ctx.strokeStyle = "rgba(255,255,255,0.2)";
            ctx.lineWidth = 0.5;
            ctx.stroke();
            ctx.restore();
        }

        draw() {
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.rotate(Math.atan2(this.vy, this.vx));
            ctx.fillStyle = '#222';
            ctx.beginPath();
            ctx.ellipse(0, 0, 15, 3, 0, 0, Math.PI * 2);
            ctx.fill();
            this.drawWing(1);
            this.drawWing(-1);
            ctx.restore();
        }
    }

    function init() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
        butterflies = [];
        for(let i=0; i<25; i++) butterflies.push(new Butterfly());
    }

    function animate() {
        ctx.fillStyle = '#050505';
        ctx.fillRect(0, 0, width, height);
        butterflies.forEach(b => {
            b.update();
            b.draw();
        });
        requestAnimationFrame(animate);
    }

    window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
    window.addEventListener('resize', init);

    init();
    animate();
</script>
</body>
</html>
